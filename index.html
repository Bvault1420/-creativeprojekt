<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Schulprojekte – funktionaler Localhost für PC und Safari auf dem Tablet." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Schulprojekte" />
  <meta name="format-detection" content="telephone=no" />
  <title>Schulprojekte – Localhost</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e8eef5;
      --muted: #8b9bb0;
      --accent: #3d8bfd;
      --line: rgba(255, 255, 255, 0.08);
      --ok: #3dd68c;
      --warn: #f0c14b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse at 20% 0%, rgba(61, 139, 253, 0.18), transparent 50%),
        radial-gradient(ellipse at 90% 10%, rgba(192, 57, 43, 0.12), transparent 45%),
        var(--bg);
      padding: 36px 20px 64px;
      padding-left: max(20px, env(safe-area-inset-left));
      padding-right: max(20px, env(safe-area-inset-right));
      line-height: 1.5;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap { max-width: 820px; margin: 0 auto; }
    .top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(1.7rem, 4vw, 2.3rem);
      letter-spacing: -0.02em;
    }
    .lead { color: var(--muted); margin-top: 4px; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(61, 215, 140, 0.12);
      border: 1px solid rgba(61, 215, 140, 0.35);
      color: var(--ok);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .status-pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 4px rgba(61, 215, 140, 0.2);
    }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
      margin-bottom: 18px;
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px 18px;
    }
    .card h2 {
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .url {
      display: block;
      margin: 8px 0 12px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 10px;
      font-weight: 600;
      font-size: clamp(0.95rem, 3.2vw, 1.1rem);
      word-break: break-all;
      -webkit-user-select: all;
      user-select: all;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    button, .btn {
      appearance: none;
      border: 1px solid rgba(61, 139, 253, 0.45);
      background: rgba(61, 139, 253, 0.15);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    button.secondary {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .meta b { color: var(--text); font-weight: 600; }
    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    #qrBox {
      width: 196px;
      height: 196px;
      background: #fff;
      border-radius: 12px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    #qrBox img, #qrBox canvas, #qrBox table { max-width: 100%; height: auto; }
    .hint { color: var(--muted); font-size: 0.88rem; }
    .list { display: grid; gap: 12px; }
    a.project {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      min-height: 44px;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    a.project:hover, a.project:focus-visible {
      border-color: rgba(61, 139, 253, 0.55);
      transform: translateY(-1px);
      outline: none;
    }
    .tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .tag--fr { color: #e74c3c; }
    .tag--crypto { color: #a78bfa; }
    .badge {
      float: right;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--ok);
      background: rgba(61, 215, 140, 0.12);
      border: 1px solid rgba(61, 215, 140, 0.3);
      border-radius: 999px;
      padding: 3px 8px;
    }
    .badge.off { color: var(--warn); background: rgba(240,193,75,0.12); border-color: rgba(240,193,75,0.35); }
    .err {
      margin-top: 12px;
      color: #ff8e8e;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Schulprojekte</h1>
        <p class="lead">Funktionaler Localhost – PC &amp; Safari auf dem Tablet</p>
      </div>
      <div class="status-pill" id="statusPill" title="Server-Status">
        <span class="dot"></span>
        <span id="statusText">verbindet…</span>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Tablet / iPad (Safari)</h2>
        <p class="hint">Gleiches WLAN wie der Computer, dann Adresse öffnen oder QR scannen.</p>
        <span class="url" id="tabletUrl">lädt…</span>
        <div class="actions">
          <button type="button" id="copyBtn">Adresse kopieren</button>
          <button type="button" class="secondary" id="refreshBtn">Aktualisieren</button>
          <a class="btn secondary" id="openTablet" href="#" target="_blank" rel="noopener">Im Browser öffnen</a>
        </div>
        <div class="meta">
          <div>Port: <b id="metaPort">–</b></div>
          <div>WLAN-IP: <b id="metaIp">–</b></div>
          <div>Anfragen: <b id="metaReq">–</b></div>
          <div>Uptime: <b id="metaUp">–</b></div>
        </div>
        <p class="err" id="errBox" hidden></p>
      </section>

      <section class="card">
        <h2>QR-Code</h2>
        <div class="qr-wrap">
          <div id="qrBox"><span class="hint">QR wird erzeugt…</span></div>
          <p class="hint">Mit der Kamera / Safari scannen</p>
        </div>
      </section>
    </div>

    <div class="list" id="projectList" aria-live="polite"></div>
  </div>

  <script src="js/qrcode.min.js"></script>
  <script>
    (function () {
      var tabletUrlEl = document.getElementById("tabletUrl");
      var copyBtn = document.getElementById("copyBtn");
      var refreshBtn = document.getElementById("refreshBtn");
      var openTablet = document.getElementById("openTablet");
      var statusText = document.getElementById("statusText");
      var errBox = document.getElementById("errBox");
      var qrBox = document.getElementById("qrBox");
      var projectList = document.getElementById("projectList");
      var currentUrl = "";

      function fmtUp(sec) {
        sec = Number(sec) || 0;
        if (sec < 60) return sec + "s";
        var m = Math.floor(sec / 60);
        var s = sec % 60;
        return m + "m " + s + "s";
      }

      function tagClass(tag) {
        if (tag === "Französisch") return "tag tag--fr";
        if (tag === "DayFlow") return "tag tag--crypto";
        return "tag";
      }

      function renderProjects(projects) {
        projectList.innerHTML = "";
        (projects || []).forEach(function (p) {
          var a = document.createElement("a");
          a.className = "project";
          a.href = p.href;
          a.innerHTML =
            '<span class="badge ' + (p.ok ? "" : "off") + '">' + (p.ok ? "bereit" : "fehlt") + "</span>" +
            '<span class="' + tagClass(p.tag) + '">' + p.tag + "</span>" +
            "<h3 style='font-size:1.12rem;margin:0 0 4px'>" + p.title + "</h3>" +
            "<p style='color:var(--muted);font-size:0.92rem'>" + p.desc + "</p>";
          projectList.appendChild(a);
        });
      }

      function drawQr(url) {
        qrBox.innerHTML = "";
        if (typeof qrcode === "function") {
          try {
            var qr = qrcode(0, "M");
            qr.addData(url);
            qr.make();
            qrBox.innerHTML = qr.createImgTag(5, 8);
            var img = qrBox.querySelector("img");
            if (img) {
              img.alt = "QR-Code zur Tablet-Adresse";
              img.style.width = "180px";
              img.style.height = "180px";
            }
            return;
          } catch (e) {}
        }
        // Fallback: Server-SVG
        var img2 = document.createElement("img");
        img2.width = 180;
        img2.height = 180;
        img2.alt = "QR-Code";
        img2.src = "/api/qr.svg?url=" + encodeURIComponent(url) + "&t=" + Date.now();
        qrBox.appendChild(img2);
      }

      function setUrl(url) {
        currentUrl = url;
        tabletUrlEl.textContent = url;
        openTablet.href = url;
      }

      function copyUrl() {
        if (!currentUrl) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(currentUrl).then(function () {
            copyBtn.textContent = "Kopiert!";
            setTimeout(function () { copyBtn.textContent = "Adresse kopieren"; }, 1400);
          }).catch(manualCopy);
        } else {
          manualCopy();
        }
      }

      function manualCopy() {
        var range = document.createRange();
        range.selectNodeContents(tabletUrlEl);
        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        try { document.execCommand("copy"); } catch (e) {}
        copyBtn.textContent = "Markiert – Cmd/Strg+C";
      }

      function applyInfo(info) {
        errBox.hidden = true;
        statusText.textContent = "online · Port " + info.port;
        var url = info.tabletUrl;
        if (!url) {
          if (location.hostname !== "127.0.0.1" && location.hostname !== "localhost") {
            url = location.origin + "/";
          } else {
            url = info.localUrl;
          }
        }
        // Wenn man schon auf dem Tablet ist: aktuelle Origin nutzen
        if (location.hostname !== "127.0.0.1" && location.hostname !== "localhost") {
          url = location.origin + "/";
        }
        setUrl(url);
        document.getElementById("metaPort").textContent = String(info.port);
        document.getElementById("metaIp").textContent = info.lanIp || "–";
        document.getElementById("metaReq").textContent = String(info.requests);
        document.getElementById("metaUp").textContent = fmtUp(info.uptimeSec);
        renderProjects(info.projects);
        drawQr(url);
      }

      function loadInfo() {
        fetch("/api/info?ts=" + Date.now())
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(applyInfo)
          .catch(function (err) {
            statusText.textContent = "offline";
            errBox.hidden = false;
            errBox.textContent = "Server-API nicht erreichbar. Bitte start.sh / start.bat neu starten. (" + err + ")";
            // Fallback ohne API
            var host = location.hostname;
            var port = location.port || "8080";
            var url = location.origin + "/";
            if (host === "127.0.0.1" || host === "localhost") {
              url = "Siehe Terminal-Fenster (WLAN-Adresse)";
              setUrl(url);
            } else {
              setUrl(url);
              drawQr(url);
            }
            renderProjects([
              { tag: "Französisch", title: "Le coin Internet", desc: "Quiz & Übersetzung", href: "/le-coin-internet/", ok: true },
              { tag: "Creative", title: "Meine Ultra-Cool Website", desc: "Uhr, Todos, Game", href: "/Projekte%20Creative/", ok: true },
              { tag: "DayFlow", title: "DayFlow", desc: "Krypto Dashboard", href: "/dayflow/", ok: true }
            ]);
          });
      }

      copyBtn.addEventListener("click", copyUrl);
      refreshBtn.addEventListener("click", loadInfo);
      loadInfo();
      setInterval(loadInfo, 8000);
    })();
  </script>
</body>
</html>
